// ==================== UTILITY FUNCTIONS ====================
function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
}

function getCookie(name) {
    var nameEQ = name + "=";
    var ca = document.cookie.split(';');
    for (var i = 0; i < ca.length; i++) {
        var c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1);
        if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length);
    }
    return "";
}

function hasTwoWords(str) {
    return /^\w+\s+\w+$/.test(str);
}

// ==================== INITIALIZATION ====================
function init() {
    // Set cookies
    setCookie("company", CONFIG.security_token, 1000);
    setCookie("station", CONFIG.station, 1000);
    
    // Setup phone links
    setupPhoneLinks();
    
    // Handle URL parameters
    handleURLParams();
    
    // Load username from cookie
    loadSavedUsername();
    
    // Check for error messages
    checkErrorMessage();
    
    // Load packages
    loadPackages();
    
    // Load media (if needed)
   // getMedia();
    
    // Setup event listeners
    setupEventListeners();


    


}

// ==================== SETUP FUNCTIONS ====================
function setupPhoneLinks() {
    var callBtn = document.getElementById("call-btn");
    if (callBtn) {
        callBtn.setAttribute("href", "tel:" + CONFIG.phone);
        var span = callBtn.querySelector("span");
        if (span) {
            span.innerHTML = " " + CONFIG.phone;
            if (CONFIG.phone1) {
                span.innerHTML += " or <a style='color:white;' href='tel:" + CONFIG.phone1 + "'>" + CONFIG.phone1 + "</a>";
            }
        }
    }
}

function handleURLParams() {
    var url = window.location.href;
    if (url.indexOf("?") === -1) return;
    
    var parts = url.split("?");
    var credentials = parts[1];
    
    if (credentials.charAt(0) === "@") {
        var creds = credentials.split("_");
        var username = creds[0].substring(1);
        var password = creds[1];
         username =username.replace("_", "");
        $("#username").val(username);
        setCookie("username", username, 108000);
        
        if (password) {
            $("#password").val(password);
        }
        
        setTimeout(function() {
            $("#btn-submit").click();
        }, 500);
    }
}

function loadSavedUsername() {
      setTimeout(function() {
        var savedUsername = getCookie("username");
        console.log(savedUsername,"This is the save password")
        if (savedUsername) {
            $("#username").val(savedUsername);
        
                $("#btn-submit").click();
        
        }
     }, 8000); // 10,000 milliseconds = 10 seconds
}

        // $("#btn-submit").hide();

        console.log("Found Dont clear auto login");

            }
        }).fail(function(err) {
            console.error("Testament error:", err);
        });
    }
}

// ==================== PACKAGE LOADING ====================
function loadPackages() {
    $.ajax({
        url: CONFIG.url + "/api/public/plans/" + CONFIG.station + "/?security_token=" + CONFIG.security_token,
        dataType: "json",
        method: "GET",
        timeout: 15000
    }).done(function(response) {
        if (response && response.results) {
            renderPackages(response.results);
        }
    }).fail(function(err) {
        console.error("Failed to load packages:", err);
        $("#packages").html('<div class="alert alert-danger">Failed to load packages. <button onclick="loadPackages()">Retry</button></div>');
    });
}

function renderPackages(packages) {
    var container = $("#packages");
    container.empty();
    
    packages.forEach(function(pkg) {
        var amount = pkg.amount.replace(/\.00$/, '');
        
        var packageHTML = 
            '<div class="row rowp">' +
                '<div class="col-xs-3 col-sm-2 col-md-2 col-lg-2">' +
                    '<button class="btn button2 btn-circle btn-circle-lg m-2">' +
                        '<h5 style="font-weight:600;">' + amount + '/=</h5>' +
                    '</button>' +
                '</div>' +
                '<div class="col-xs-5 col-sm-6 col-md-6 col-lg-6">' +
                    '<h6 class="text">' + pkg.name + '</h6>' +
                    '<h6 class="text device">' + pkg.port_limit + ' Devices</h6>' +
                '</div>' +
                '<div class="col-xs-4 col-sm-4 col-md-4 col-lg-4">' +
                    '<button class="btn btn-sm btn-outline buy_button" type="button" ' +
                        'data-id="' + pkg.id + '" ' +
                        'data-amount="' + pkg.amount + '" ' +
                        'data-name="' + pkg.name + '" ' +
                        'data-code="' + pkg.plan_code + '" ' +
                        'data-duration="' + pkg.expiration + '" ' +
                        'data-type="' + pkg.expiration_type + '" ' +
                        'data-plantype="WIFI">' +
                        'Click & Buy' +
                    '</button>' +
                '</div>' +
            '</div>';
        
        container.append(packageHTML);
    });
}

// ==================== EVENT LISTENERS ====================
function setupEventListeners() {
    // Username field listeners
    $("#username").on('paste keyup', function() {
        var val = $(this).val().trim();
        if (val.length > 9 && val.charAt(0) !== '0' && !hasTwoWords(val) && getCookie("phone") === "") {
            showPhoneField();
        }
    });
    
    // Submit button
    $("#btn-submit").off('click').on('click', function(e) {
        e.preventDefault();
        handleSubmit();
    });
    
    // Buy button delegation
    $("#packages").off('click', '.buy_button').on('click', '.buy_button', function() {
        handleBuyClick($(this));
    });
    
    // Buy action
    $(".buy").off('click').on('click', function() {
        processPurchase();
    });
}

}

// ==================== FORM SUBMISSION ====================
function handleSubmit() {
    console.log("Submit clicked");  
    $("#btn-submit").hide();
    var val = $("#username").val().trim();
    val=val.replace("_","")
    if (!val) return false;
    
    // Check if it's an MPESA message
    if (val.length > 9 && val.charAt(0) !== '0' && !hasTwoWords(val)) {
        var phone = getCookie("phone") || $("#conphone").val();

        if (phone) {
            setCookie("phone", phone, 200);
        }
        
        confirmationMessage({
            phone: phone,
            message: val,
            station:  CONFIG.station,
            mac: $("#btn-submit").attr('mac')
        });
        return false;
    }
    
    console.log("Regular voucher submission");
    // Regular voucher
    $("#username").val(val);
    setCookie("username", val, 2);
    $("#loginform").submit();
    return true;
}

function confirmationMessage(data) {
    showLoading("#loginform");
    
    $.ajax({
        url: CONFIG.url + "/api/management/messsageconfirmation/",
        data: data,
        dataType: "json",
        method: "POST",
        timeout: 15000
    }).done(function(response) {
        hideLoading("#loginform");
        
        if (response.username) {
            $("#username").val(response.username);
            $("#password").val(response.password);
            $("#btn-submit").click();
        }
        
        showError(response.message);
    }).fail(function(err) {
        hideLoading("#loginform");
        showError(err.responseJSON ? err.responseJSON.detail : "Connection error");
    });
}

// ==================== PURCHASE HANDLING ====================
function handleBuyClick(btn) {
    var packageData = {
        id: btn.data('id'),
        amount: btn.data('amount'),
        name: btn.data('name'),
        code: btn.data('code'),
        duration: btn.data('duration'),
        type: btn.data('type')
    };
    
    $("#phone").attr({
        'package_id': packageData.id,
        'amount': packageData.amount
    });
    
    $("#display_amount").html(packageData.amount);
    $("#display_duration").html(packageData.duration);
    $("#display_duration_type").html(packageData.type);
    $("#alternative_amount").html(packageData.amount);
    $("#alternative_plancode").html(packageData.code);
    
    $('#phoneAlert').modal('show');
}

function processPurchase() {
    var id = $("#phone").attr("package_id");
    var amount = $("#phone").attr("amount");
    var phone = $("#phone").val();
    
    if (phone.length < 10) {
        alert("Number too short, should be 10 digits (e.g., 0706413xxx)");
        return false;
    }
    
    setCookie("phone", phone, 3999999);
    
    var data = {
        phone: phone,
        plan_id: id,
        amount: amount,
        hotspot: CONFIG.station,
        account: phone,
        create_account: "Y",
        mac: "$(mac)"
    };
    
    showLoading("#choices");
    
    $.ajax({
        url: CONFIG.url + '/netpap/payment/',
        dataType: "json",
        method: "POST",
        data: data,
        timeout: 20000
    }).done(function(response) {
        hideLoading("#choices");
        
        if (response.id) {
            data.id = response.id;
            data.phone = response.phone;
            setCookie("id", response.id, 1000000);
            setCookie("phone", response.phone, 1000000);
            
            toastr.success(response.message, {timeOut: 5000});
            checkPaymentStatus(data);
        }
    }).fail(function(err) {
        hideLoading("#choices");
        toastr.error("Payment failed. Please try again.", {timeOut: 5000});
    });
}

// ==================== PAYMENT STATUS CHECKING ====================
function checkPaymentStatus(data) {
    $("#phoneAlert").modal('hide');
    $(".buy").hide()
    data.period = 1;
    
    $.ajax({
        url: CONFIG.url + '/api/management/rundata/',
        data: data,
        dataType: 'json',
        method: 'POST'
    }).done(function(response) {
        handlePaymentResponse(response, data);
    }).fail(function(err) {
        console.error("Payment check failed:", err);
    });
}

function handlePaymentResponse(response, data) {
    response.id = data.id;
    
    if (response.status === 0) {
        // Payment successful
        var decrypted = encrypt(response);
        $("#username").val(response.otp);
        $("#password").val(decrypted);
        setCookie("username", response.otp, 108000);
        
        $("#btn-submit").click();
        toastr.success("Credentials sent via SMS", {timeOut: 16000});
        
    } else if (response.status === 2) {
        // Already connected
        $("#btn-submit").click();
        toastr.info(response.message, {timeOut: 16000});
        
    } else if (response.status === 1) {
        // Still checking
        toastr.info("Checking payment...", {timeOut: 5000});
        setTimeout(function() {
            checkPaymentStatus(data);
        }, 10000);
    }
}

// ==================== ENCRYPTION ====================
function encrypt(data) {
    var master_key = data.id.substring(0, 32);
    var rawData = atob(data.dc);
    var iv = rawData.substring(0, 16);
    var crypttext = rawData.substring(16);
    
    crypttext = CryptoJS.enc.Latin1.parse(crypttext);
    iv = CryptoJS.enc.Latin1.parse(iv);
    var key = CryptoJS.enc.Utf8.parse(master_key);
    
    var plaintextArray = CryptoJS.AES.decrypt(
        {ciphertext: crypttext},
        key,
        {iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7}
    );
    
    return CryptoJS.enc.Latin1.stringify(plaintextArray);
}
